<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="logo.jpg" type="image/jpeg">
    <title>รับสินค้าเข้า | Bemind Stock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <div id="sidebar-wrapper">
            <div class="text-center py-4 border-bottom">
                <img src="logo.jpg" alt="Logo" style="width: 50px; height: 50px; border-radius: 12px;">
                <div class="mt-2 fw-bold" style="color: var(--brand-teal);">Bemind Stock</div>
            </div>
            <div class="list-group list-group-flush mt-3">
                <a href="report.html" class="list-group-item list-group-item-action"><i class="bi bi-file-earmark-bar-graph me-2"></i> สรุปรายงาน (Excel)</a>
                <a href="dashboard.html" class="list-group-item list-group-item-action"><i class="bi bi-grid me-2"></i> ภาพรวมคลัง</a>
                <a href="receive.html" class="list-group-item list-group-item-action active"><i class="bi bi-box-arrow-in-down me-2"></i> รับเข้า (IN)</a>
                <a href="issue.html" class="list-group-item list-group-item-action"><i class="bi bi-box-arrow-up me-2"></i> เบิกออก (OUT)</a>
                <a href="manage.html" class="list-group-item list-group-item-action"><i class="bi bi-boxes me-2"></i> จัดการสินค้า</a>
                <a href="history.html" class="list-group-item list-group-item-action"><i class="bi bi-clock-history me-2"></i> ประวัติรายการ</a>
                <a href="#" onclick="logout()" class="list-group-item list-group-item-action text-danger mt-5"><i class="bi bi-power me-2"></i> ออกจากระบบ</a>
            </div>
        </div>

        <div id="page-content-wrapper" class="w-100">
            <nav class="navbar navbar-light bg-white py-3 px-4 border-bottom">
                <h5 class="m-0 fw-bold"><i class="bi bi-box-arrow-in-down text-teal"></i> บันทึกรับสินค้าเข้า</h5>
            </nav>

            <div class="container-fluid p-4">
                <div class="row justify-content-center">
                    <div class="col-md-6">
                        <div class="card-custom">
                            <form id="receiveForm">
                                <div class="mb-3">
                                    <label class="form-label small fw-bold">วันที่ทำรายการ</label>
                                    <input type="date" id="trans-date" class="form-control">
                                    <small class="text-muted">ปล่อยว่างไว้หากต้องการใช้วันที่ปัจจุบัน</small>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label small fw-bold">เลือกสินค้า</label>
                                    <select id="product-select" class="form-select" required>
                                        <option value="">-- กำลังโหลดสินค้า --</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label small fw-bold">จำนวนที่รับเข้า (ชิ้น)</label>
                                    <input type="number" id="qty" class="form-control" placeholder="0" required min="1">
                                </div>
                                <div class="mb-4">
                                    <label class="form-label small fw-bold">หมายเหตุ (ถ้ามี)</label>
                                    <input type="text" id="remark" class="form-control" placeholder="เช่น รับจากซัพพลายเออร์ A">
                                </div>
                                <button type="submit" class="btn btn-teal w-100 py-3" id="submitBtn">
                                    <i class="bi bi-check-circle me-2"></i> ยืนยันบันทึกสต๊อก
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxjnQQXVuLGnEV-eRYha3vkQUVwMoVleh0Ndmaoh3rfjn9FtYrgGVSYNfzBlx2mg4Fm/exec";

        window.onload = async function() {
            const user = localStorage.getItem('inventory_user');
            if(!user) { window.location.href = "index.html"; return; }
            loadProducts();
        }

        async function loadProducts() {
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "getProducts" }) });
                const data = await res.json();
                let html = '<option value="">-- เลือกสินค้า --</option>';
                data.data.forEach(p => {
                    html += `<option value="${p.id}">${p.id} | ${p.name} (คงเหลือ: ${p.balance})</option>`;
                });
                document.getElementById('product-select').innerHTML = html;
            } catch (err) {
                document.getElementById('product-select').innerHTML = '<option value="">โหลดข้อมูลไม่สำเร็จ</option>';
            }
        }

        document.getElementById('receiveForm').onsubmit = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> กำลังบันทึก...';

            const payload = {
                action: "saveTransaction",
                type: "รับเข้า",
                date: document.getElementById('trans-date').value,
                productId: document.getElementById('product-select').value,
                qty: document.getElementById('qty').value,
                remark: document.getElementById('remark').value,
                user: localStorage.getItem('inventory_user')
            };

            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                if(result.success) {
                    alert("บันทึกสำเร็จ!");
                    location.reload();
                } else { alert(result.message); }
            } catch (err) { alert("เกิดข้อผิดพลาดในการเชื่อมต่อ"); }
            
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-check-circle me-2"></i> ยืนยันบันทึกสต๊อก';
        }

        function logout() { localStorage.removeItem('inventory_user'); window.location.href = "index.html"; }
    </script>
</body>
</html>
